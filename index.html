<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clubinho da Aprendizagem</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  overflow-x:hidden;
}

/* ===== HERO CÉU ===== */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 8%;
  position:relative;
  background:linear-gradient(to top, #87cefa, #bfe9ff);
}

/* NUVENS */
.cloud{
  position:absolute;
  background:white;
  border-radius:100px;
  opacity:0.9;
  filter:blur(0.3px);
  animation:moveClouds linear infinite;
}

.cloud::before,
.cloud::after{
  content:"";
  position:absolute;
  background:white;
  border-radius:50%;
}

/* nuvem 1 */
.cloud1{
  width:120px;
  height:60px;
  top:20%;
  left:-150px;
  animation-duration:30s;
}
.cloud1::before{
  width:60px;
  height:60px;
  top:-20px;
  left:15px;
}
.cloud1::after{
  width:70px;
  height:70px;
  top:-25px;
  left:50px;
}

/* nuvem 2 */
.cloud2{
  width:160px;
  height:70px;
  top:55%;
  left:-200px;
  animation-duration:45s;
}
.cloud2::before{
  width:70px;
  height:70px;
  top:-25px;
  left:20px;
}
.cloud2::after{
  width:80px;
  height:80px;
  top:-30px;
  left:70px;
}

/* nuvem 3 */
.cloud3{
  width:100px;
  height:50px;
  top:35%;
  left:-120px;
  animation-duration:35s;
}
.cloud3::before{
  width:50px;
  height:50px;
  top:-15px;
  left:10px;
}
.cloud3::after{
  width:60px;
  height:60px;
  top:-20px;
  left:40px;
}

@keyframes moveClouds{
  from{ transform:translateX(0); }
  to{ transform:translateX(140vw); }
}

/* TEXTO ESQUERDA */
.hero-text{
  width:50%;
  z-index:2;
  color:#1f3b57;
}

.hero-text h1{
  font-size:2.6rem;
  margin-bottom:15px;
}

.hero-text p{
  font-size:1.1rem;
  max-width:450px;
  color:#2f4f6f;
}

.btn{
  display:inline-block;
  margin-top:20px;
  padding:12px 22px;
  border-radius:30px;
  background:#ff6b9d;
  color:white;
  text-decoration:none;
  font-weight:600;
  box-shadow:0 10px 20px rgba(255,107,157,0.3);
}

/* LOGO DIREITA */
.hero-logo{
  width:40%;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:2;
}

.hero-logo img{
  width:280px;
  max-width:90%;
  animation:float 4s ease-in-out infinite;
  filter:drop-shadow(0 20px 20px rgba(0,0,0,0.2));
}

@keyframes float{
  0%,100%{ transform:translateY(0); }
  50%{ transform:translateY(-15px); }
}

/* RESPONSIVO */
@media(max-width:768px){
  .hero{
    flex-direction:column;
    text-align:center;
    justify-content:center;
    gap:30px;
  }

  .hero-text{
    width:100%;
  }

  .hero-logo{
    width:100%;
  }
}
</style>
</head>

<body>

<section class="hero">

  <!-- NUVENS -->
  <div class="cloud cloud1"></div>
  <div class="cloud cloud2"></div>
  <div class="cloud cloud3"></div>

  <!-- TEXTO ESQUERDA -->
  <div class="hero-text">
    <h1>Bem-vindo ao Clubinho da Aprendizagem 🌈</h1>
    <p>Um espaço leve, divertido e acolhedor onde aprender é brincar e crescer com alegria.</p>

    <a class="btn" href="#contato">Entrar no Clubinho</a>
  </div>

  <!-- LOGO DIREITA -->
  <div class="hero-logo">
    <img src="https://i.imgur.com/86LuJEt.png" alt="Logo">
  </div>

</section>

</body>
</html>
